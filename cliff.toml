[changelog]
# changelog header
header = "# Changelog\n\nAll notable changes to this project will be documented in this file.\n\n"
# template for the changelog body
# https://keats.github.io/tera/docs/#introduction
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
            {% if commit.breaking %}[BREAKING] {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.links %} ({{ commit.links | join(sep=", ") }}){% endif %}\
    {% endfor %}
{% endfor %}\n
"""
# remove the leading and trailing whitespace from the template
trim = true
# footer for the changelog
footer = ""
# post-processors to apply to the changelog
postprocessors = []

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# which commits should be considered as breaking
filter_unconventional = false
# regex to match commit messages
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^doc", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^style", group = "Styling" },
    { message = "^test", group = "Testing" },
    { message = "^build", group = "Build" },
    { message = "^ci", group = "CI" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps.*\\)", skip = true },
    { message = "^chore\\(pr\\)", skip = true },
    { message = "^chore\\(pull\\)", skip = true },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore|^docs|^refactor|^style|^test|^build|^perf", group = "Maintenance" },
]
# protect breaking changes from being skipped due to group
protect_breaking_changes = false
# filter out revert commits
filter_commits = false
# regex to match git tags
tag_pattern = "v[0-9].*"
# sort commits inside a group by scope
sort_commits = "scope"
# sort commits by column
sort_commits_col = 0
