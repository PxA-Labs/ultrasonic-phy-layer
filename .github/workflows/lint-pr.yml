name: Lint PR

on:
  pull_request:
    types: [opened, edited, synchronize]
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read
  contents: read

jobs:
  conventional-commit:
    name: Conventional Commit title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          VALID_TYPES="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)"
          SCOPE="(\([a-z0-9._-]+\))?"
          SUBJECT=": [a-z].+"
          PATTERN="^(${VALID_TYPES}${SCOPE}${SUBJECT}|(WIP|wip)[\[\]:])"

          if echo "$TITLE" | grep -qE "$PATTERN"; then
            echo "PR title '$TITLE' is valid."
          else
            echo "Invalid PR title: '$TITLE'"
            echo ""
            echo "Expected format: type(scope): subject"
            echo "  type: feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert"
            echo "  scope: optional lowercase identifier"
            echo "  subject: must start with a lowercase letter"
            exit 1
          fi
