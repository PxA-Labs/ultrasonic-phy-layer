name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze C/C++
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['c-cpp']
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: manual

      - name: Build DSP core
        run: |
          cd native
          cmake -B build -DCMAKE_BUILD_TYPE=Debug
          cmake --build build

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"
