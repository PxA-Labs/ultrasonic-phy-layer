name: Release

on:
  push:
    tags: ['v**']

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check for Flutter project
        id: check
        run: |
          if [ ! -f pubspec.yaml ]; then
            echo "::notice::No pubspec.yaml found at root. Skipping Flutter build."
            echo "has_pubspec=false" >> $GITHUB_OUTPUT
          else
            echo "has_pubspec=true" >> $GITHUB_OUTPUT
          fi

      - uses: subosito/flutter-action@v2
        if: steps.check.outputs.has_pubspec == 'true'
        with:
          flutter-version: '3.41.x'
          cache: true

      - uses: actions/setup-java@v4
        if: steps.check.outputs.has_pubspec == 'true'
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        if: steps.check.outputs.has_pubspec == 'true'
        run: flutter build apk --release

      - name: Build AAB
        if: steps.check.outputs.has_pubspec == 'true'
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v7
        if: steps.check.outputs.has_pubspec == 'true'
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check for Flutter project
        id: check
        shell: bash
        run: |
          if [ ! -f pubspec.yaml ]; then
            echo "::notice::No pubspec.yaml found at root. Skipping Flutter build."
            echo "has_pubspec=false" >> $GITHUB_OUTPUT
          else
            echo "has_pubspec=true" >> $GITHUB_OUTPUT
          fi

      - uses: subosito/flutter-action@v2
        if: steps.check.outputs.has_pubspec == 'true'
        with:
          flutter-version: '3.41.x'
          cache: true

      - name: Build Windows
        if: steps.check.outputs.has_pubspec == 'true'
        run: flutter build windows --release

      - uses: actions/upload-artifact@v7
        if: steps.check.outputs.has_pubspec == 'true'
        with:
          name: windows-release
          path: build/windows/x64/runner/Release/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check for Flutter project
        id: check
        run: |
          if [ ! -f pubspec.yaml ]; then
            echo "::notice::No pubspec.yaml found at root. Skipping Flutter build."
            echo "has_pubspec=false" >> $GITHUB_OUTPUT
          else
            echo "has_pubspec=true" >> $GITHUB_OUTPUT
          fi

      - uses: subosito/flutter-action@v2
        if: steps.check.outputs.has_pubspec == 'true'
        with:
          flutter-version: '3.41.x'
          cache: true

      - name: Build macOS
        if: steps.check.outputs.has_pubspec == 'true'
        run: flutter build macos --release

      - uses: actions/upload-artifact@v7
        if: steps.check.outputs.has_pubspec == 'true'
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check for Flutter project
        id: check
        run: |
          if [ ! -f pubspec.yaml ]; then
            echo "::notice::No pubspec.yaml found at root. Skipping Flutter build."
            echo "has_pubspec=false" >> $GITHUB_OUTPUT
          else
            echo "has_pubspec=true" >> $GITHUB_OUTPUT
          fi

      - uses: subosito/flutter-action@v2
        if: steps.check.outputs.has_pubspec == 'true'
        with:
          flutter-version: '3.41.x'
          cache: true

      - name: Install Linux dependencies
        if: steps.check.outputs.has_pubspec == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Build Linux
        if: steps.check.outputs.has_pubspec == 'true'
        run: flutter build linux --release

      - uses: actions/upload-artifact@v7
        if: steps.check.outputs.has_pubspec == 'true'
        with:
          name: linux-release
          path: build/linux/x64/release/bundle/

  deploy-android:
    runs-on: ubuntu-latest
    needs: [build-android]
    if: always() && needs.build-android.result == 'success'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-release

      - name: Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Deploy to Play Store
        if: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.pxalabs.soundwave
          releaseFiles: app-release.aab
          track: internal
          status: completed

  deploy-github-release:
    runs-on: ubuntu-latest
    needs: [build-android, build-windows, build-macos, build-linux]
    if: always() && contains(needs.*.result, 'success')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android-release/*
            windows-release/*
            macos-release/*
            linux-release/*
          draft: true
          generate_release_notes: true

  deploy-snap:
    runs-on: ubuntu-latest
    needs: [build-linux]
    if: always() && needs.build-linux.result == 'success'
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: snap/gui/

      - uses: snapcore/action-build@v1
        id: snapcraft

      - uses: snapcore/action-publish@v1
        if: ${{ secrets.SNAP_TOKEN != '' }}
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_TOKEN }}
        with:
          snap: ${{ steps.snapcraft.outputs.snap }}
          release: stable
