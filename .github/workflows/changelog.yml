name: Changelog

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-changelog:
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          curl -LsS "https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-x86_64-unknown-linux-gnu.tar.gz" \
            -o /tmp/git-cliff.tar.gz
          tar -xzf /tmp/git-cliff.tar.gz -C /tmp/
          BIN=$(find /tmp -name "git-cliff" -type f 2>/dev/null | head -1)
          sudo mv "$BIN" /usr/local/bin/git-cliff
          sudo chmod +x /usr/local/bin/git-cliff
          git-cliff --version

      - name: Generate changelog
        run: git-cliff --unreleased -o CHANGELOG.md

      - name: Commit updated changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update CHANGELOG.md [skip ci]"
          git push
