name: Changelog

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-changelog:
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          ASSET_URL=$(curl -s https://api.github.com/repos/orhun/git-cliff/releases/latest \
            | jq -r '.assets[] | select(.name | test("x86_64-unknown-linux-gnu\\.tar\\.gz$")) | .browser_download_url')
          curl -LsS "$ASSET_URL" -o /tmp/git-cliff.tar.gz
          tar -xzf /tmp/git-cliff.tar.gz -C /tmp/
          sudo mv /tmp/git-cliff-*/git-cliff /usr/local/bin/
          git-cliff --version

      - name: Generate changelog
        run: git-cliff --unreleased -o CHANGELOG.md

      - name: Commit updated changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update CHANGELOG.md [skip ci]"
          git push
