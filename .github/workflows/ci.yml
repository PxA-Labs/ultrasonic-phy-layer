name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  flutter-quality-gate:
    runs-on: ubuntu-latest
    if: hashFiles('pubspec.yaml') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze --fatal-infos

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Run Flutter tests
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info

  dsp-core:
    runs-on: ubuntu-latest
    if: hashFiles('native/CMakeLists.txt') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc g++ make

      - name: Build DSP core
        run: |
          cd native
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Run DSP core tests
        run: |
          cd native/build
          ctest --output-on-failure

  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken markdown links
        run: |
          echo "Checking markdown files..."
          find . -name "*.md" -not -path "./.git/*" | while read f; do
            echo "Found: $f"
          done

      - name: Validate markdown structure
        run: |
          for file in docs/*.md README.md; do
            if [ -f "$file" ]; then
              echo "Validating: $file"
              head -1 "$file" | grep -q "^#" || echo "WARNING: $file may be missing heading"
            fi
          done
