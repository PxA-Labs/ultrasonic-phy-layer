name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  flutter-quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: soundwave_app
    steps:
      - uses: actions/checkout@v4

      - name: Check for Flutter project
        id: check
        run: echo "exists=$([ -f pubspec.yaml ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        if: steps.check.outputs.exists == 'true'
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: flutter pub get

      - name: Analyze Dart code
        if: steps.check.outputs.exists == 'true'
        run: flutter analyze --fatal-infos

      - name: Check formatting
        if: steps.check.outputs.exists == 'true'
        run: dart format --set-exit-if-changed .

      - name: Run Flutter tests
        if: steps.check.outputs.exists == 'true'
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && steps.check.outputs.exists == 'true'
        uses: codecov/codecov-action@v4
        with:
          files: soundwave_app/coverage/lcov.info

  dsp-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for native CMakeLists
        id: check
        run: echo "exists=$([ -f native/CMakeLists.txt ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        if: steps.check.outputs.exists == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc g++ make

      - name: Build DSP core
        if: steps.check.outputs.exists == 'true'
        run: |
          cd native
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Run DSP core tests
        if: steps.check.outputs.exists == 'true'
        run: |
          cd native/build
          ctest --output-on-failure

  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken markdown links
        run: |
          echo "Checking markdown files..."
          find . -name "*.md" -not -path "./.git/*" | while read f; do
            echo "Found: $f"
          done

      - name: Validate markdown structure
        run: |
          for file in docs/*.md README.md; do
            if [ -f "$file" ]; then
              echo "Validating: $file"
              head -1 "$file" | grep -q "^#" || echo "WARNING: $file may be missing heading"
            fi
          done
